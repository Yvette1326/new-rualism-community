<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>根茎冥想曲 · 搜索结果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f0f5fa 0%, #e6ecf3 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .music-card {
            max-width: 600px; width: 100%; background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px); border-radius: 48px; padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0,20,40,0.15), 0 0 0 1px rgba(255,255,255,0.5) inset;
            border: 1px solid rgba(255,255,255,0.8); text-align: center;
        }
        .cover-icon {
            width: 120px; height: 120px; background: #d9e4f0; border-radius: 50%;
            margin: 0 auto 24px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(80,100,120,0.2), 0 0 0 2px white inset;
            color: #3c5a7f; font-size: 48px;
        }
        h1 { font-size: 2.2rem; font-weight: 400; color: #1e3b5c; margin-bottom: 8px; }
        .subtitle { font-size: 1rem; color: #5e7c9c; margin-bottom: 28px; font-style: italic; border-bottom: 1px dashed #b0c8dd; padding-bottom: 20px; }
        .time-tag {
            display: inline-block; background: #d4e1f0; border-radius: 40px; padding: 8px 20px;
            font-size: 0.95rem; color: #1e3b5c; font-weight: 500; margin-bottom: 30px;
        }
        .audio-container {
            background: #eef4fb; border-radius: 50px; padding: 8px 8px 8px 24px;
            display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.8);
        }
        audio { flex: 1; height: 44px; border-radius: 30px; outline: none; }
        .footer-note { margin-top: 25px; font-size: 0.8rem; color: #8fa5bd; }
        .back-link { display: inline-block; margin-top: 25px; color: #4a6f94; text-decoration: none; border-bottom: 1px dotted #a6bbd3; cursor: pointer; }
    </style>
</head>
<body>
    <div class="music-card">
        <div class="cover-icon"><i>🎵</i></div>
        <h1>根茎冥想曲</h1>
        <div class="subtitle">Rhizome Meditation · 钢琴独奏</div>
        <div class="time-tag"><i class="fa-regular fa-clock" style="margin-right: 6px;"></i> 嫁接：1444</div>

        <!-- 使用本地音频文件（需自行准备时长为14:44的MP3文件） -->
        <div class="audio-container">
            <audio id="meditationMusic" controls>
                <source src="audio/meditation.mp3" type="audio/mpeg">
                您的浏览器不支持 audio 元素。
            </audio>
        </div>
        <div class="footer-note">⏳ 点击播放按钮开始冥想</div>
        <a href="#" onclick="window.close(); return false;" class="back-link">← 关闭页面返回</a>
    </div>
</body>
</html>
